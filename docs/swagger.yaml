host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Smith API server for managing loops and anomalies.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Smith API
  version: "1.0"
paths:
  /v1/loops:
    get:
      consumes:
      - application/json
      description: Get all loop states or create a new loop
      parameters:
      - description: Create Loop Request
        in: body
        name: request
        schema:
          $ref: '#/definitions/cmd_smith-api.loopCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List Loops
          schema:
            items:
              $ref: '#/definitions/smith_pkg_api_v1.LoopWithRevision'
            type: array
        "201":
          description: Create Loop
          schema:
            $ref: '#/definitions/smith_pkg_api_v1.LoopCreateResult'
      security:
      - BearerAuth: []
      summary: List or create loops
      tags:
      - loops
    post:
      consumes:
      - application/json
      description: Get all loop states or create a new loop
      parameters:
      - description: Create Loop Request
        in: body
        name: request
        schema:
          $ref: '#/definitions/cmd_smith-api.loopCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List Loops
          schema:
            items:
              $ref: '#/definitions/smith_pkg_api_v1.LoopWithRevision'
            type: array
        "201":
          description: Create Loop
          schema:
            $ref: '#/definitions/smith_pkg_api_v1.LoopCreateResult'
      security:
      - BearerAuth: []
      summary: List or create loops
      tags:
      - loops
  /v1/loops/{id}:
    delete:
      description: Get detailed information about a loop or delete it
      parameters:
      - description: Loop ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Loop Details
          schema:
            $ref: '#/definitions/smith_pkg_api_v1.LoopResponse'
      security:
      - BearerAuth: []
      summary: Get or delete loop
      tags:
      - loops
    get:
      description: Get detailed information about a loop or delete it
      parameters:
      - description: Loop ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Loop Details
          schema:
            $ref: '#/definitions/smith_pkg_api_v1.LoopResponse'
      security:
      - BearerAuth: []
      summary: Get or delete loop
      tags:
      - loops
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

global:
  environment: local
  featureFlags:
    interactiveAttach: true

etcd:
  endpoints:
    - http://smith-etcd.smith-system.svc.cluster.local:2379
    - http://smith-etcd-x-smith-system-x-smith-vc.smith-vcluster.svc.cluster.local:2379

secrets:
  create: true
  managed:
    gitPat: local-dev-token
    runtimeCredentials: local-runtime-token

core:
  replicaCount: 1
  image:
    repository: smith-core
    tag: local
    pullPolicy: Never
  replicaImage:
    repository: smith-replica
    tag: local
    pullPolicy: Never
  loopPolicy:
    maxAttempts: 2
    backoffInitial: 2s
    backoffMax: 30s
    timeout: 20m
  replicaTemplate:
    serviceAccountName: ""
    env:
      - name: SMITH_REPLICA_LOG_LEVEL
        value: debug
api:
  replicaCount: 1
  image:
    repository: smith-api
    tag: local
    pullPolicy: Never
console:
  replicaCount: 1
  image:
    repository: smith-console
    tag: local
    pullPolicy: Never

chat:
  replicaCount: 1
  image:
    repository: smith-chat
    tag: local
    pullPolicy: Never

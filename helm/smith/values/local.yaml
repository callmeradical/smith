global:
  environment: local
  featureFlags:
    interactiveAttach: true

secrets:
  create: true
  managed:
    gitPat: local-dev-token
    runtimeCredentials: local-runtime-token

core:
  replicaCount: 1
  loopPolicy:
    maxAttempts: 2
    backoffInitial: 2s
    backoffMax: 30s
    timeout: 20m
  replicaTemplate:
    serviceAccountName: smith-local-replica
    env:
      - name: SMITH_REPLICA_LOG_LEVEL
        value: debug
api:
  replicaCount: 1
console:
  replicaCount: 1

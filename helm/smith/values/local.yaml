global:
  environment: local
  featureFlags:
    interactiveAttach: true

etcd:
  endpoints:
    - http://smith-etcd-x-smith-system-x-smith-vc.smith-vcluster.svc.cluster.local:2379

secrets:
  create: true
  managed:
    gitPat: local-dev-token
    runtimeCredentials: local-runtime-token

core:
  replicaCount: 1
  loopPolicy:
    maxAttempts: 2
    backoffInitial: 2s
    backoffMax: 30s
    timeout: 20m
  replicaTemplate:
    serviceAccountName: ""
    env:
      - name: SMITH_REPLICA_LOG_LEVEL
        value: debug
api:
  replicaCount: 1
console:
  replicaCount: 1

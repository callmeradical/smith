apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smith.fullname" . }}-console
  labels:
    {{- include "smith.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels:
      {{- include "smith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        {{- include "smith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      {{- $runtimeSecretName := include "smith.runtimeSecretName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "smith.serviceAccountName" (dict "component" "console" "root" .) }}
      containers:
        - name: console
          image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}"
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          env:
            - name: SMITH_API_BASE_URL
              value: {{ printf "http://%s-api:%v" (include "smith.fullname" .) .Values.api.service.port | quote }}
            {{- if $runtimeSecretName }}
            - name: SMITH_RUNTIME_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ $runtimeSecretName }}
                  key: {{ .Values.secrets.keys.runtimeCredentials }}
            {{- end }}
            {{- with .Values.console.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smith.fullname" . }}-api
  labels:
    {{- include "smith.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "smith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "smith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- $runtimeSecretName := include "smith.runtimeSecretName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "smith.serviceAccountName" (dict "component" "api" "root" .) }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: SMITH_ETCD_ENDPOINTS
              value: {{ join "," .Values.etcd.endpoints | quote }}
            - name: SMITH_AUTH_STORE_BACKEND
              value: "kubernetes"
            - name: SMITH_AUTH_STORE_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SMITH_AUTH_STORE_K8S_SECRET
              value: "{{ include "smith.fullname" . }}-auth-store"
            - name: SMITH_AUTH_STORE_K8S_KEY
              value: "tokens.json"
            {{- if $runtimeSecretName }}
            - name: SMITH_GIT_PAT
              valueFrom:
                secretKeyRef:
                  name: {{ $runtimeSecretName }}
                  key: {{ .Values.secrets.keys.gitPat }}
            - name: SMITH_RUNTIME_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ $runtimeSecretName }}
                  key: {{ .Values.secrets.keys.runtimeCredentials }}
            {{- end }}
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smith.fullname" . }}-core
  labels:
    {{- include "smith.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.core.replicaCount }}
  selector:
    matchLabels:
      {{- include "smith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        {{- include "smith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core
    spec:
      {{- $runtimeSecretName := include "smith.runtimeSecretName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "smith.serviceAccountName" (dict "component" "core" "root" .) }}
      containers:
        - name: core
          image: "{{ .Values.core.image.repository }}:{{ .Values.core.image.tag }}"
          imagePullPolicy: {{ .Values.core.image.pullPolicy }}
          env:
            - name: SMITH_ETCD_ENDPOINTS
              value: {{ join "," .Values.etcd.endpoints | quote }}
            - name: SMITH_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: SMITH_REPLICA_IMAGE
              value: "{{ .Values.core.image.repository }}:{{ .Values.core.image.tag }}"
            - name: SMITH_REPLICA_IMAGE_PULL_POLICY
              value: {{ .Values.core.image.pullPolicy | quote }}
            - name: SMITH_LOOP_POLICY_MAX_ATTEMPTS
              value: {{ .Values.core.loopPolicy.maxAttempts | quote }}
            - name: SMITH_LOOP_POLICY_BACKOFF_INITIAL
              value: {{ .Values.core.loopPolicy.backoffInitial | quote }}
            - name: SMITH_LOOP_POLICY_BACKOFF_MAX
              value: {{ .Values.core.loopPolicy.backoffMax | quote }}
            - name: SMITH_LOOP_POLICY_TIMEOUT
              value: {{ .Values.core.loopPolicy.timeout | quote }}
            - name: SMITH_LOOP_POLICY_TERMINATE_ON_ERROR
              value: {{ .Values.core.loopPolicy.terminateOnError | quote }}
            - name: SMITH_REPLICA_TEMPLATE_SERVICE_ACCOUNT
              value: {{ default (printf "%s-replica" (include "smith.fullname" .)) .Values.core.replicaTemplate.serviceAccountName | quote }}
            - name: SMITH_REPLICA_TEMPLATE_RESOURCES
              value: {{ .Values.core.replicaTemplate.resources | toJson | quote }}
            - name: SMITH_REPLICA_TEMPLATE_NODE_SELECTOR
              value: {{ .Values.core.replicaTemplate.nodeSelector | toJson | quote }}
            - name: SMITH_REPLICA_TEMPLATE_TOLERATIONS
              value: {{ .Values.core.replicaTemplate.tolerations | toJson | quote }}
            - name: SMITH_REPLICA_TEMPLATE_ENV
              value: {{ .Values.core.replicaTemplate.env | toJson | quote }}
            {{- if $runtimeSecretName }}
            - name: SMITH_GIT_PAT
              valueFrom:
                secretKeyRef:
                  name: {{ $runtimeSecretName }}
                  key: {{ .Values.secrets.keys.gitPat }}
            - name: SMITH_RUNTIME_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ $runtimeSecretName }}
                  key: {{ .Values.secrets.keys.runtimeCredentials }}
            {{- end }}
            {{- with .Values.core.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8081
              name: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}

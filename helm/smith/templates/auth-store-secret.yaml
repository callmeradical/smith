{{- $secretName := printf "%s-auth-store" (include "smith.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "smith.labels" . | nindent 4 }}
type: Opaque
stringData:
  tokens.json: {{ if and $existing $existing.data (hasKey $existing.data "tokens.json") }}{{ index $existing.data "tokens.json" | b64dec | quote }}{{ else }}'{"tokens":{}}'{{ end }}

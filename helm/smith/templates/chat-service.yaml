apiVersion: v1
kind: Service
metadata:
  name: {{ include "smith.fullname" . }}-chat
  labels:
    {{- include "smith.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  type: {{ .Values.chat.service.type }}
  ports:
    - port: {{ .Values.chat.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smith.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chat

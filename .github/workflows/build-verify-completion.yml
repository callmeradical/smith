name: Build Smith Verify Completion

on:
  pull_request:
    paths:
      - 'cmd/smith-verify-completion/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-verify-completion.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run smith-verify-completion tests
        run: go test -v ./cmd/smith-verify-completion/...

      - name: Run internal unit tests
        run: go test -v ./internal/...

      - name: Build smith-verify-completion
        run: go build -o bin/smith-verify-completion ./cmd/smith-verify-completion

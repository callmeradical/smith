name: Build Smith

on:
  pull_request:
    paths:
      - 'cmd/smith/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-smith.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run smith tests
        run: go test -v ./cmd/smith/...

      - name: Run internal unit tests
        run: go test -v ./internal/...

      - name: Build smith
        run: go build -o bin/smith ./cmd/smith

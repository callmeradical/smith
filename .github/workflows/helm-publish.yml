name: Publish Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'helm/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm Lint
        run: helm lint helm/smith

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Helm Chart
        if: github.event_name == 'push'
        run: |
          helm package helm/smith
          # Extract version from Chart.yaml (or use tags)
          CHART_VERSION=$(grep '^version:' helm/smith/Chart.yaml | awk '{print $2}')
          echo "Pushing smith-$CHART_VERSION.tgz to GHCR"
          helm push "smith-$CHART_VERSION.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

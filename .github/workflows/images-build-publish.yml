name: Build and Publish Images

on:
  push:
    branches:
      - main
      - acceptance-tests
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-scan-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_PLATFORMS: linux/amd64,linux/arm64
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: core
            dockerfile: docker/core.Dockerfile
          - image: replica
            dockerfile: docker/replica.Dockerfile
          - image: console
            dockerfile: docker/console.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/smith-${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=semver,pattern={{version}}

      - name: Build image (local)
        id: build-local
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: smith-${{ matrix.image }}:ci

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: smith-${{ matrix.image }}:ci
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: smith-${{ matrix.image }}:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Build and publish image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

name: Fixture Validation

on:
  pull_request:
    paths:
      - 'test/fixtures/smith-repo/**'
      - 'scripts/fixtures/**'
      - '.github/workflows/fixture-validation.yml'
  workflow_dispatch:

jobs:
  validate-fixture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Provision fixture repository
        run: ./scripts/fixtures/provision-smith-test-repo.sh /tmp/smith-test-repo

      - name: Verify fixture repository
        run: ./scripts/fixtures/verify-smith-test-repo.sh /tmp/smith-test-repo

      - name: Reset fixture repository
        run: ./test/fixtures/smith-repo/scripts/reset.sh /tmp/smith-test-repo

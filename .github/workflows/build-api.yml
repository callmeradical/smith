name: Build Smith API

on:
  pull_request:
    paths:
      - 'cmd/smith-api/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run smith-api tests
        run: go test -v ./cmd/smith-api/...

      - name: Run internal unit tests
        run: go test -v ./internal/...

      - name: Build smith-api
        run: go build -o bin/smith-api ./cmd/smith-api

name: Acceptance Harness

on:
  pull_request:
    branches:
      - acceptance-tests
  workflow_dispatch:

jobs:
  validate-acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run acceptance harness
        run: ./scripts/validate-acceptance.sh

name: Build Smith Chat

on:
  pull_request:
    paths:
      - 'cmd/smith-chat/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-chat.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run smith-chat tests
        run: go test -v ./cmd/smith-chat/...

      - name: Run internal unit tests
        run: go test -v ./internal/...

      - name: Build smith-chat
        run: go build -o bin/smith-chat ./cmd/smith-chat

name: docs-pages

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - '.github/workflows/docs-pages.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - '.github/workflows/docs-pages.yml'

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Zensical
        run: pip install zensical

      - name: Set project site_url for this repository
        run: |
          SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          tmpfile="$(mktemp)"
          awk -v url="$SITE_URL" '
            /^site_url = / {
              print "site_url = \"" url "\""
              next
            }
            { print }
          ' zensical.toml > "$tmpfile"
          mv "$tmpfile" zensical.toml
          echo "Resolved site_url=$SITE_URL"

      - name: Build docs
        run: zensical build

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

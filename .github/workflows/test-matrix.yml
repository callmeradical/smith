name: Test Matrix

on:
  pull_request:
    paths:
      - 'internal/**'
      - 'scripts/test/**'
      - 'scripts/fixtures/**'
      - 'test/fixtures/**'
      - 'docs/test-matrix-and-failure-injection.md'
      - '.github/workflows/test-matrix.yml'
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test matrix
        env:
          SMITH_TEST_ARTIFACTS_DIR: /tmp/smith-test-artifacts
          SMITH_FIXTURE_DIR: /tmp/smith-test-repo
          SMITH_ENABLE_CLUSTER_TESTS: "false"
        run: ./scripts/test/run-matrix.sh

      - name: Upload matrix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smith-test-matrix-artifacts
          path: /tmp/smith-test-artifacts

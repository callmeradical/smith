<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smith Operator Console</title>
  <script src="/runtime-config.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --fg: #101418;
      --panel: #ffffff;
      --border: #d6dce2;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% -10%, #e2f7f5, transparent 50%), var(--bg);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--fg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(10, 18, 30, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.5;
    }
    code {
      background: #ecf2f3;
      border-radius: 6px;
      padding: 2px 6px;
      font-family: "IBM Plex Mono", monospace;
    }
    .chip {
      display: inline-block;
      border: 1px solid #8ab0aa;
      color: var(--accent);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <span class="chip">smith-console</span>
    <h1>Operator Console</h1>
    <p>Runtime API endpoint: <code id="api-url"></code></p>
    <p>This container serves the console shell and injects API endpoint config from environment at startup.</p>
  </main>
  <script>
    var config = window.__SMITH_CONFIG__ || {};
    document.getElementById("api-url").textContent = config.apiBaseUrl || "(unset)";
  </script>
</body>
</html>
